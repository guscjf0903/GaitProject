spring:
  application:
    name: gait-project
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  ai:
    model:
      # 기본은 비활성화(OPENAI_API_KEY 없을 때도 서버가 떠야 함)
      # OpenAI 사용 시: SPRING_AI_MODEL_CHAT=openai
      chat: ${SPRING_AI_MODEL_CHAT:none}
      embedding: ${SPRING_AI_MODEL_EMBEDDING:none}
      image: ${SPRING_AI_MODEL_IMAGE:none}
      moderation: ${SPRING_AI_MODEL_MODERATION:none}
      audio:
        # TTS는 현재 사용하지 않으므로 항상 비활성화
        speech: ${SPRING_AI_MODEL_AUDIO_SPEECH:none}
        transcription: ${SPRING_AI_MODEL_AUDIO_TRANSCRIPTION:none}
    # OpenAI 설정 (GPT-4o)
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o}
          temperature: ${OPENAI_TEMPERATURE:0.7}
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
    
    # Vertex AI Gemini 설정
    vertex:
      ai:
        gemini:
          project-id: ${GOOGLE_PROJECT_ID:}
          location: ${GOOGLE_LOCATION:us-central1}
          credentials:
            location: ${GOOGLE_CREDENTIALS_PATH:}
          chat:
            options:
              model: ${GEMINI_MODEL:gemini-1.5-flash}
              temperature: ${GEMINI_TEMPERATURE:0.7}
          enabled: ${GEMINI_ENABLED:false}
          pro:
            enabled: ${GEMINI_PRO_ENABLED:false}
            chat:
              options:
                model: ${GEMINI_PRO_MODEL:gemini-1.5-pro}
                temperature: ${GEMINI_PRO_TEMPERATURE:0.7}

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.gait: ${LOG_LEVEL_APP:DEBUG}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:DEBUG}
    org.hibernate.type.descriptor.sql.BasicBinder: ${LOG_LEVEL_BINDER:TRACE}

app:
  jwt:
    # 개발용 기본값. 운영에서는 환경변수/Secret Manager로 주입하세요.
    # HS256 기준 최소 32바이트 이상 권장.
    secret: ${APP_JWT_SECRET:change-me-to-a-very-long-secret-key-please-32bytes}
    ttl-seconds: ${APP_JWT_TTL_SECONDS:86400}
  ai:
    # AI 서비스 사용 여부 (false면 StubAiService 사용)
    use-stub: ${APP_AI_USE_STUB:true}
    # 머지 요약용 모델 (Squash/Deep 각각 변경 가능)
    merge-summary:
      squash-model: ${APP_AI_MERGE_SQUASH_MODEL:gpt-4o-mini}
      deep-model: ${APP_AI_MERGE_DEEP_MODEL:gpt-4o-mini}
    # RAG 검색 설정
    rag:
      token-budget: ${APP_AI_RAG_TOKEN_BUDGET:2000}
      max-results: ${APP_AI_RAG_MAX_RESULTS:5}
