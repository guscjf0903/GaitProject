version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: gait-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-gaitdb}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gait-network

volumes:
  postgres_data:
    driver: local

networks:
  gait-network:
    driver: bridge

